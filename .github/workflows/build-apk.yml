name: Build APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      build_type:
        description: APK build variant to run
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  debug-build:
    # Do debug builds for non-migrate-from-webapp pushes, or manual runs that explicitly choose debug.
    if: >-
      (github.event_name == 'push' && github.ref != 'refs/heads/migrate-from-webapp') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug')
    uses: ./.github/workflows/build-apk-common.yml
    with:
      variant: debug
    secrets: inherit

  release-build:
    # Do release builds for migrate-from-webapp pushes, or manual runs that choose release on the migrate-from-webapp branch only.
    if: >-
      github.ref == 'refs/heads/migrate-from-webapp' &&
      (
        (github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && inputs.build_type == 'release')
      )
    uses: ./.github/workflows/build-apk-common.yml
    with:
      variant: release
    secrets: inherit
