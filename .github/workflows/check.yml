name: Check

on:
  push:

jobs:
  check:
    runs-on: ubuntu-24.04
    env:
      # Use fresh SDK root for build stability
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Run repository checks
        run: ./gradlew --no-daemon check

  ui-tests:
    runs-on: ubuntu-24.04
    env:
      # Use fresh SDK root for build stability
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      SIGNING_STORE_FILE: ${{ github.workspace }}/debug.keystore
      SIGNING_STORE_PASSWORD: android
      SIGNING_KEY_ALIAS: androiddebugkey
      SIGNING_KEY_PASSWORD: android

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create debug signing keystore
        run: |
          keytool -genkeypair \
            -alias "$SIGNING_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype PKCS12 \
            -keystore "$SIGNING_STORE_FILE" \
            -storepass "$SIGNING_STORE_PASSWORD" \
            -keypass "$SIGNING_KEY_PASSWORD" \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Run Android UI tests
        uses: reactivecircus/android-emulator-runner@v2.35.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: ./gradlew --no-daemon connectedCheck
