name: Check

on:
  push:

jobs:
  check:
    runs-on: ubuntu-24.04
    env:
      # Use fresh SDK root for build stability
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Run repository checks
        run: ./gradlew --no-daemon check

  ui-tests:
    runs-on: ubuntu-24.04
    env:
      # Use fresh SDK root for build stability
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android UI tests
        uses: reactivecircus/android-emulator-runner@v2.35.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: ./gradlew --no-daemon connectedCheck

      - name: Write test summary
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          reports=(app/build/outputs/androidTest-results/connected/uiTest/TEST-*.xml)
          ./scripts/summarize-ui-tests "${reports[@]}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-ui-test-reports
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: warn
