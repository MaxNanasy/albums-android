name: Build APK Common (Reusable)

on:
  workflow_call:
    inputs:
      variant:
        description: Build variant (debug or release)
        required: true
        type: string
    secrets:
      RELEASE_KEYSTORE_BASE64:
        required: false
      RELEASE_KEYSTORE_PASSWORD:
        required: false
      RELEASE_KEY_ALIAS:
        required: false
      RELEASE_KEY_PASSWORD:
        required: false

jobs:
  build-apk-common:
    runs-on: ubuntu-24.04
    env:
      # Use fresh SDK root for build stability
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk

    steps:
      - name: Resolve variant-derived settings
        env:
          VARIANT: ${{ inputs.variant }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$VARIANT" != "debug" ] && [ "$VARIANT" != "release" ]; then
            echo "Invalid variant: '$VARIANT'. Expected 'debug' or 'release'."
            exit 1
          fi

          variant_capitalized="$(printf '%s' "$VARIANT" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"

          echo "GRADLE_TASK=assemble${variant_capitalized}" >> "$GITHUB_ENV"
          echo "APK_FILENAME=app-${VARIANT}-${RUN_ID}.apk" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=app-${VARIANT}-${RUN_ID}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up release keystore
        if: ${{ inputs.variant == 'release' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release-signing.jks
        run: |
          set -euo pipefail
          check_required_secret() {
            local required_secret="$1"
            local required_value="$2"
            if [ -z "$required_value" ]; then
              echo "Missing required secret: ${required_secret}"
              exit 1
            fi
          }

          check_required_secret "RELEASE_KEYSTORE_BASE64" "$RELEASE_KEYSTORE_BASE64"
          check_required_secret "RELEASE_KEYSTORE_PASSWORD" "$RELEASE_KEYSTORE_PASSWORD"
          check_required_secret "RELEASE_KEY_ALIAS" "$RELEASE_KEY_ALIAS"

          printf %s "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RELEASE_KEYSTORE_PATH"

      - name: Build debug APK
        if: ${{ inputs.variant == 'debug' }}
        env:
          APP_VERSION_NAME: ${{ github.run_id }}
        run: ./gradlew --no-daemon -PappVersionName="${APP_VERSION_NAME}" ${{ env.GRADLE_TASK }}

      - name: Build release APK
        if: ${{ inputs.variant == 'release' }}
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release-signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || secrets.RELEASE_KEYSTORE_PASSWORD }}
          APP_VERSION_NAME: ${{ github.run_id }}
        run: ./gradlew --no-daemon -PappVersionName="${APP_VERSION_NAME}" ${{ env.GRADLE_TASK }}

      - name: Prepare APK artifact payload
        env:
          VARIANT: ${{ inputs.variant }}
          APK_FILENAME: ${{ env.APK_FILENAME }}
        run: |
          set -euo pipefail
          source_apk="$(find "app/build/outputs/apk/${VARIANT}" -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$source_apk" ]; then
            echo "No APK found for variant ${VARIANT}."
            exit 1
          fi

          cp "$source_apk" "${RUNNER_TEMP}/${APK_FILENAME}"
          echo "ARTIFACT_PATH=${RUNNER_TEMP}/${APK_FILENAME}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 1
